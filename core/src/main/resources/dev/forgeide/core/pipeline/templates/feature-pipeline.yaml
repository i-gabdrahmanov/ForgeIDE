# feature-pipeline — полный TDD-пайплайн Forge (SD §5, FORGE.md/pipeline-technical.md).
# brd → ground → design → (gate) → jira → per_task_loop{red → judge → green → judge} → (gate) → deliver.
# Пути prompt/check привязывает импортёр обвязки (T24); поля безопасности — SDD §5.1.
version: 1
id: feature-pipeline

params:
  feature_name:
    required: true
    hint: "Короткое название фичи (используется в slug'ах веток/директорий)"
  spec_path:
    required: false
    hint: "Путь к спецификации проекта, если уже существует"

steps:
  - id: fp-brd
    type: agent
    runtime: gigacode
    prompt: prompts/fp-brd.md
    expects: ["docs/${feature.slug}/brd.md"]
    allowed_write: [docs/**]
    env_scope: []
    budget: {tokens: 2_000_000, wall_clock: 30m, output_mb: 256}
    retry: {stream: 1, script: 0}

  - id: judge-brd
    type: judge
    target: fp-brd
    check:
      command: [python3, .gigacode/skills/feature-pipeline/scripts/check_brd_doc.py]
      timeout: 5m
    fail_policy: {max_iterations: 3}

  - id: gate-brd
    type: gate
    depends_on: [judge-brd]
    question: "Утвердить бизнес-требования?"
    options: [Утвердить, Отклонить]
    show:
      - docs/${feature.slug}/brd.md
    risk: R1

  - id: fp-ground
    type: agent
    runtime: gigacode
    depends_on: [gate-brd]
    prompt: prompts/fp-ground.md
    expects: ["ground/${feature.slug}/grounding-excerpt.json"]
    allowed_write: [ground/**]
    env_scope: []
    budget: {tokens: 2_000_000, wall_clock: 20m, output_mb: 256}

  - id: fp-design
    type: agent
    runtime: gigacode
    depends_on: [fp-ground]
    prompt: prompts/fp-design.md
    expects:
      - docs/${feature.slug}/tech-design.md
      - docs/${feature.slug}/task-plan.json
    allowed_write: [docs/**]
    env_scope: []
    budget: {tokens: 3_000_000, wall_clock: 30m, output_mb: 256}

  - id: gate-design
    type: gate
    depends_on: [fp-design]
    question: "Утвердить tech-design и план задач?"
    options: [Утвердить, Отклонить]
    show:
      - docs/${feature.slug}/tech-design.md
    risk: R1

  - id: fp-jira
    type: agent
    runtime: gigacode
    depends_on: [gate-design]
    prompt: prompts/fp-jira.md
    expects: ["docs/${feature.slug}/task-plan.json"]
    allowed_write: [docs/**]
    env_scope: [JIRA_TOKEN]
    budget: {tokens: 1_000_000, wall_clock: 15m, output_mb: 64}

  - id: fp-tasks
    type: per_task_loop
    depends_on: [fp-jira]
    task_plan: docs/${feature.slug}/task-plan.json
    template:
      - id: fp-red
        type: agent
        runtime: gigacode
        prompt: prompts/fp-red.md
        expects: [src/test/**]
        allowed_write: [src/test/**]
        env_scope: []
        budget: {tokens: 2_000_000, wall_clock: 30m, output_mb: 256}

      - id: judge-red
        type: judge
        target: fp-red
        check:
          command: [python3, .gigacode/skills/feature-pipeline/scripts/check_tests_red.py]
          timeout: 5m
        fail_policy: {max_iterations: 3}

      - id: fp-green
        type: agent
        runtime: gigacode
        depends_on: [judge-red]
        prompt: prompts/fp-green.md
        expects: [src/main/**]
        allowed_write: [src/**, build/**]
        env_scope: []
        budget: {tokens: 4_000_000, wall_clock: 40m, output_mb: 512}

      - id: judge-build
        type: judge
        target: fp-green
        check:
          command: [python3, .gigacode/skills/feature-pipeline/scripts/check_build.py]
          timeout: 10m
        fail_policy: {max_iterations: 3}

  - id: judge-delivery
    type: judge
    target: fp-tasks
    check:
      command: [python3, .gigacode/skills/feature-pipeline/scripts/check_delivery.py]
      timeout: 10m
    fail_policy: {max_iterations: 3}

  - id: gate-deliver
    type: gate
    depends_on: [judge-delivery]
    question: "Доставить изменения (git push + PR)?"
    options: [Доставить, Отклонить]
    risk: R2

  - id: fp-deliver
    type: outward
    depends_on: [gate-deliver]
    actions: [git_push, create_pr]
    env_scope: [GIT_TOKEN]
